name: ti-pr-lifecycle
description: |
  Use when: Starting any new feature, fix, refactor, or research task for terra-incognita-v2.
  Triggers: "new feature", "implement", "build feature", "start PR", "lifecycle", "feature request".
  Does: Governance check → archon PIV loop (Explore→Plan→Implement→Validate) →
        independent verifier gate → PR with (#NNN) format.
  NOT for: Bug fixes (use ti-fix-issue), quick reviews (use archon-smart-pr-review).

provider: claude
model: sonnet

nodes:
  - id: meta-check
    command: ti-meta
    context: fresh

  - id: load-memory
    prompt: |
      Load project context for terra-incognita-v2 before implementation begins.
      Read and summarize relevant content from:
      - memory/system/architecture.md
      - memory/system/decisions.md
      - memory/runtime/open-issues.md
      - app/docs/greenfield/implementation/mvp/00-index.md (§7 Status table)
      Output: concise context summary for the implementation agent.
    depends_on: [meta-check]
    context: fresh

  - id: plan
    command: archon-create-plan
    depends_on: [load-memory]
    context: fresh

  - id: setup
    command: archon-plan-setup
    depends_on: [plan]
    context: fresh

  - id: confirm
    command: archon-confirm-plan
    depends_on: [setup]
    context: fresh

  - id: implement
    command: archon-implement-tasks
    depends_on: [confirm]
    context: fresh
    model: opus

  - id: validate
    command: archon-validate
    depends_on: [implement]
    context: fresh

  - id: verify
    command: ti-verifier
    depends_on: [validate]
    context: fresh

  - id: create-pr
    prompt: |
      Create a draft PR using gh CLI.
      Verification: $verify.output
      Only proceed if MERGE READINESS: VERIFIED. If BLOCKED, stop and list gates.
      PR rules: title "type: description (#NNN)", no Co-Authored-By, draft first.
      Use: gh pr create --draft --title "..." --body "..."
    depends_on: [verify]
    context: fresh
