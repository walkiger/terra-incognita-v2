name: ti-fast-verify
description: |
  Use when: Quick pre-push confidence check on current branch.
  Triggers: "fast verify", "quick check", "pre-push check", "ci check", "verify branch".
  Does: Run tests (bash) → independent verifier gate (Pi/free).
  For PR review: use ti-smart-pr-review instead.

provider: pi
model: openrouter/google/gemini-2.5-flash-preview:free

nodes:
  - id: run-tests
    bash: |
      uv run pytest tests -q \
        -m "not compose_hub and not compose_vault and not compose_observability and not alembic_isolation" \
        2>&1 | tee "$ARTIFACTS_DIR/test-output.txt"
      echo "Test exit code: $?"

  - id: verify
    command: ti-verifier
    depends_on: [run-tests]
    context: fresh
    provider: pi
    model: openrouter/google/gemini-2.5-flash-preview:free
