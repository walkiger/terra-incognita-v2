name: ti-fast-verify
description: |
  Use when: Quick confidence check before pushing or requesting review.
  Triggers: "fast verify", "quick check", "pre-push check", "ci check", "verify branch".
  Does: Run tests → smart PR review (Archon) → independent verifier (terra-incognita-v2 gate).

provider: claude
model: sonnet

nodes:
  - id: run-tests
    bash: |
      uv run pytest tests -q \
        -m "not compose_hub and not compose_vault and not compose_observability and not alembic_isolation" \
        2>&1 | tee "$ARTIFACTS_DIR/test-output.txt"
      echo "Test exit code: $?"

  - id: smart-review
    command: archon-smart-pr-review
    depends_on: [run-tests]
    context: fresh

  - id: verify
    command: ti-verifier
    depends_on: [smart-review]
    context: fresh
