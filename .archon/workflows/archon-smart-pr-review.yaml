name: archon-smart-pr-review
description: |
  Use when: User wants a smart, efficient PR review that adapts to PR complexity.
  Triggers: "smart review", "review this PR", "review PR #123", "efficient review",
            "smart PR review", "quick review".
  Does: Gathers PR scope -> classifies complexity -> routes to only relevant review agents ->
        synthesizes findings -> auto-fixes CRITICAL/HIGH issues.
  NOT for: When you explicitly want ALL review agents (use archon-comprehensive-pr-review instead).

  Provider: Pi/OpenRouter (free). Claude-Budget ist für Cursor reserviert.

provider: pi
model: openrouter/google/gemini-2.5-flash-preview:free

nodes:
  - id: scope
    command: archon-pr-review-scope

  - id: sync
    command: archon-sync-pr-with-main
    depends_on: [scope]

  - id: classify
    prompt: |
      You are a PR complexity classifier. Analyze the PR scope and determine which review agents to run.

      ## PR Scope
      $scope.output

      ## Rules
      - code_review: Always run unless diff is empty or non-code only.
      - error_handling: Run if diff touches try/catch, async/await, error handling.
      - test_coverage: Run if diff touches source code.
      - comment_quality: Run if diff adds/modifies comments or docstrings.
      - docs_impact: Run if diff adds/removes/renames public APIs, CLI flags, env vars.
      Classify: trivial / small / medium / large
    depends_on: [scope]
    allowed_tools: []
    output_format:
      type: object
      properties:
        run_code_review: { type: string, enum: ["true", "false"] }
        run_error_handling: { type: string, enum: ["true", "false"] }
        run_test_coverage: { type: string, enum: ["true", "false"] }
        run_comment_quality: { type: string, enum: ["true", "false"] }
        run_docs_impact: { type: string, enum: ["true", "false"] }
        complexity:
          { type: string, enum: ["trivial", "small", "medium", "large"] }
        reasoning: { type: string }
      required:
        [
          run_code_review,
          run_error_handling,
          run_test_coverage,
          run_comment_quality,
          run_docs_impact,
          complexity,
          reasoning,
        ]

  - id: code-review
    command: archon-code-review-agent
    depends_on: [classify, sync]
    when: "$classify.output.run_code_review == 'true'"

  - id: error-handling
    command: archon-error-handling-agent
    depends_on: [classify, sync]
    when: "$classify.output.run_error_handling == 'true'"

  - id: test-coverage
    command: archon-test-coverage-agent
    depends_on: [classify, sync]
    when: "$classify.output.run_test_coverage == 'true'"

  - id: comment-quality
    command: archon-comment-quality-agent
    depends_on: [classify, sync]
    when: "$classify.output.run_comment_quality == 'true'"

  - id: docs-impact
    command: archon-docs-impact-agent
    depends_on: [classify, sync]
    when: "$classify.output.run_docs_impact == 'true'"

  - id: synthesize
    command: archon-synthesize-review
    depends_on:
      [code-review, error-handling, test-coverage, comment-quality, docs-impact]
    trigger_rule: one_success

  - id: implement-fixes
    command: archon-implement-review-fixes
    depends_on: [synthesize]
