name: ti-fix-issue
description: |
  Use when: A GitHub issue needs to be fixed for terra-incognita-v2.
  Triggers: "fix issue", "fix #NNN", "resolve issue", "bug fix", "close issue".
  Does: Governance check → fix pipeline → verifier gate.
  Provider: Pi/OpenRouter (free). Claude-Budget ist für Cursor reserviert.

provider: pi
model: openrouter/deepseek/deepseek-chat-v3-0324:free

nodes:
  - id: meta-check
    command: ti-meta
    context: fresh

  - id: fix
    command: archon-fix-github-issue
    depends_on: [meta-check]
    context: fresh

  - id: verify
    command: ti-verifier
    depends_on: [fix]
    context: fresh

  - id: enforce-rules
    prompt: |
      Enforce terra-incognita-v2 PR rules.
      Verifier: $verify.output
      If BLOCKED: post PR comment with blocking gates. Stop.
      If VERIFIED: ensure all commits end with (#NNN), no Co-Authored-By.
    depends_on: [verify]
    context: fresh
