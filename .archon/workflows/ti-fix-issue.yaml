name: ti-fix-issue
description: |
  Use when: A GitHub issue needs to be fixed for terra-incognita-v2.
  Triggers: "fix issue", "fix #NNN", "resolve issue", "bug fix", "close issue".
  Does: Governance check → archon-fix-github-issue (full fix pipeline) → verifier gate.
  NOT for: New features (use ti-pr-lifecycle), large refactors.

provider: claude
model: sonnet

nodes:
  - id: meta-check
    command: ti-meta
    context: fresh

  - id: fix
    command: archon-fix-github-issue
    depends_on: [meta-check]
    context: fresh
    model: opus

  - id: verify
    command: ti-verifier
    depends_on: [fix]
    context: fresh

  - id: enforce-rules
    prompt: |
      Enforce terra-incognita-v2 PR rules after fix.
      Verifier: $verify.output
      If BLOCKED: post PR comment with blocking gates. Stop.
      If VERIFIED: ensure all commits end with (#NNN), no Co-Authored-By anywhere.
      Fix violations via git commit --amend or gh pr edit.
    depends_on: [verify]
    context: fresh
