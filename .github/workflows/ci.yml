name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.12"

      - name: Sync deps (frozen lockfile)
        run: uv sync --frozen --extra dev

      - name: Ruff check
        run: uv run ruff check app/backend/ti_hub tests

      - name: Ruff format
        run: uv run ruff format --check app/backend/ti_hub tests

      - name: Mypy (ti_hub)
        run: uv run mypy app/backend/ti_hub

      - name: Pytest
        run: uv run pytest tests -q
