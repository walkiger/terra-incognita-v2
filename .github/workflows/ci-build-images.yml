name: CI build hub API image

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  docker-hub-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: deploy/api
          push: false
          tags: terra-hub-api:${{ github.ref_name }}
