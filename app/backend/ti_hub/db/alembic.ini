# Hub SQLite — Alembic (M1.3).
# Prefer env var TI_HUB_ALEMBIC_URL (sqlite+aiosqlite URL to a file DB on disk).
# Fallback: sqlalchemy.url below (not suitable for :memory: migrations with multiple attaches).

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = %(here)s/../..
version_path_separator = os
sqlalchemy.url = sqlite+aiosqlite:///%(here)s/placeholder.sqlite

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
