# Hub tunnel routing (VM-A, Modus A — Container-Tunnel).
#
# Production tunnel: terra-hub (8d4bb120-c82e-4344-be09-73fa4b012c74)
# Domain: terra-incognita.cloud (Cloudflare Free zone, NS bei Cloudflare)
#
# Modus B (Host-Tunnel via systemd + Token) nutzt stattdessen die
# Published Application Routes im Zero-Trust-Dashboard — diese Datei
# wird dann nicht geladen (siehe hub.override.host-tunnel.yml).

tunnel: 8d4bb120-c82e-4344-be09-73fa4b012c74
credentials-file: /etc/cloudflared/credentials/8d4bb120-c82e-4344-be09-73fa4b012c74.json

ingress:
  # hub.terra-incognita.cloud — Caddy reverse-proxies /v1* to API
  - hostname: hub.terra-incognita.cloud
    service: http://caddy:80

  - service: http_status:404
