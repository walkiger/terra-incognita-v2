# Vault stack — Greenfield M0.4 (mirror / backup VM topology).
# Profiles:
#   --profile minimal  → caddy + cloudflared + r2-pull stub (Σ mem_limit ≤ 480 MB)
#   --profile default  → minimal + prom-node-exporter

services:
  caddy:
    profiles: ["minimal", "default"]
    image: caddy:2.8-alpine
    restart: unless-stopped
    oom_score_adj: -200
    mem_limit: 96m
    mem_reservation: 64m
    volumes:
      - ../caddy/Caddyfile.vault:/etc/caddy/Caddyfile:ro
    networks:
      - vault
    depends_on:
      r2-pull:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  r2-pull:
    profiles: ["minimal", "default"]
    build:
      context: ../workers/r2-pull
      dockerfile: Dockerfile
    restart: unless-stopped
    oom_score_adj: 300
    mem_limit: 96m
    mem_reservation: 48m
    expose:
      - "8081"
      - "8082"
    volumes:
      - ../litestream/config.vault-pull.yml:/etc/litestream.yml:ro
    environment:
      ACCESS_KEY_ID: ${ACCESS_KEY_ID:-}
      SECRET_ACCESS_KEY: ${SECRET_ACCESS_KEY:-}
      REPLICA_ENDPOINT: ${REPLICA_ENDPOINT:-}
      REPLICA_URL: ${REPLICA_URL:-}
      SKIP_VERIFY: ${SKIP_VERIFY:-false}
      LITESTREAM_CONFIG: /etc/litestream.yml
      VAULT_DB_PATH: /var/lib/vault/db/terra.sqlite
    networks:
      - vault
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8082/vault/status', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    profiles: ["minimal", "default"]
    image: cloudflare/cloudflared:2025.2.0
    restart: unless-stopped
    oom_score_adj: 200
    mem_limit: 96m
    mem_reservation: 48m
    volumes:
      - ../cloudflared/config.vault.yml:/etc/cloudflared/config.yml:ro
      - ../cloudflared/credentials:/etc/cloudflared/credentials:ro
    command:
      - tunnel
      - --no-autoupdate
      - --config
      - /etc/cloudflared/config.yml
      - run
    networks:
      - vault
    depends_on:
      caddy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    profiles: ["default"]
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    oom_score_adj: 150
    mem_limit: 80m
    mem_reservation: 64m
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=24h
      - --web.enable-lifecycle
    volumes:
      - ../prometheus/prometheus.vault.yml:/etc/prometheus/prometheus.yml:ro
    expose:
      - "9090"
    networks:
      - vault
    depends_on:
      r2-pull:
        condition: service_started
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prom-node-exporter:
    profiles: ["default"]
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    oom_score_adj: 500
    mem_limit: 48m
    mem_reservation: 32m
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - vault
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9100/metrics >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vault:
    driver: bridge
