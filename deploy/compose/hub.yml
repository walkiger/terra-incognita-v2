# Hub stack — Greenfield M0.3 (local / CF Tunnel topology).
# Profiles:
#   --profile minimal  → core (API + Caddy + NATS + cloudflared), RAM limits Σ ≤ 720 MB
#   --profile default  → minimal + prom-node-exporter + prometheus + grafana (M0.9)

services:
  api:
    profiles: ["minimal", "default"]
    build:
      context: ../..
      dockerfile: deploy/api/Dockerfile
    restart: unless-stopped
    oom_score_adj: -100
    mem_limit: 352m
    mem_reservation: 256m
    expose:
      - "8000"
    environment:
      METRICS_BEARER_TOKEN: ${METRICS_BEARER_TOKEN:-bootstrap-metrics-token}
    networks:
      - hub
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/v1/health\")"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    profiles: ["minimal", "default"]
    image: caddy:2.8-alpine
    restart: unless-stopped
    oom_score_adj: -200
    mem_limit: 96m
    mem_reservation: 64m
    volumes:
      - ../caddy/Caddyfile.hub:/etc/caddy/Caddyfile:ro
    networks:
      - hub
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/v1/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nats:
    profiles: ["minimal", "default"]
    image: nats:2.10-alpine
    restart: unless-stopped
    oom_score_adj: 0
    mem_limit: 96m
    mem_reservation: 64m
    command: ["-js", "-m", "8222"]
    expose:
      - "4222"
      - "8222"
    networks:
      - hub
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    profiles: ["minimal", "default"]
    image: cloudflare/cloudflared:2025.2.0
    restart: unless-stopped
    oom_score_adj: 200
    mem_limit: 96m
    mem_reservation: 48m
    volumes:
      - ../cloudflared/config.hub.yml:/etc/cloudflared/config.yml:ro
      - ../cloudflared/credentials:/etc/cloudflared/credentials:ro
    command:
      - tunnel
      - --no-autoupdate
      - --config
      - /etc/cloudflared/config.yml
      - run
    networks:
      - hub
    depends_on:
      caddy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prom-node-exporter:
    profiles: ["default"]
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    oom_score_adj: 500
    mem_limit: 48m
    mem_reservation: 32m
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - hub
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9100/metrics >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    profiles: ["default"]
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    oom_score_adj: 150
    mem_limit: 80m
    mem_reservation: 64m
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=24h
      - --web.enable-lifecycle
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/alert_rules.example.yml:/etc/prometheus/alert_rules.example.yml:ro
      - ../prometheus/bearer.token:/etc/prometheus/bearer.token:ro
    expose:
      - "9090"
    networks:
      - hub
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    profiles: ["default"]
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    oom_score_adj: 160
    mem_limit: 110m
    mem_reservation: 96m
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: dark
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    expose:
      - "3000"
    networks:
      - hub
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 50s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  hub:
    driver: bridge
