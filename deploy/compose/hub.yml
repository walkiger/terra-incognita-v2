# Hub stack — Greenfield M0.3 (local / CF Tunnel topology).
# Profiles:
#   --profile minimal  → core (API + Caddy + NATS + cloudflared), RAM limits Σ ≤ 720 MB
#   --profile default  → minimal + prom-node-exporter

services:
  api:
    profiles: ["minimal", "default"]
    build:
      context: ../api
      dockerfile: Dockerfile
    restart: unless-stopped
    oom_score_adj: -100
    mem_limit: 352m
    mem_reservation: 256m
    expose:
      - "8000"
    networks:
      - hub
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/v1/health\")"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    profiles: ["minimal", "default"]
    image: caddy:2.8-alpine
    restart: unless-stopped
    oom_score_adj: -200
    mem_limit: 96m
    mem_reservation: 64m
    volumes:
      - ../caddy/Caddyfile.hub:/etc/caddy/Caddyfile:ro
    networks:
      - hub
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/v1/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nats:
    profiles: ["minimal", "default"]
    image: nats:2.10-alpine
    restart: unless-stopped
    oom_score_adj: 0
    mem_limit: 96m
    mem_reservation: 64m
    command: ["-js", "-m", "8222"]
    expose:
      - "4222"
      - "8222"
    networks:
      - hub
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    profiles: ["minimal", "default"]
    image: cloudflare/cloudflared:2025.2.0
    restart: unless-stopped
    oom_score_adj: 200
    mem_limit: 96m
    mem_reservation: 48m
    command:
      - tunnel
      - --no-autoupdate
      - --url
      - http://caddy:80
    networks:
      - hub
    depends_on:
      caddy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prom-node-exporter:
    profiles: ["default"]
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    oom_score_adj: 500
    mem_limit: 48m
    mem_reservation: 32m
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - hub
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9100/metrics >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  hub:
    driver: bridge
