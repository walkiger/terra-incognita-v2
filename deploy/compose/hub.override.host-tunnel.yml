# Use when Cloudflare Tunnel runs on the HOST (systemd + dashboard token).
# Prevents a second connector from the cloudflared container (same tunnel → conflicts).
# Pair with hub.override.dev.yml so the host tunnel can reach Caddy at http://127.0.0.1:8080.
#
# Example:
#   docker compose -f deploy/compose/hub.yml \
#     -f deploy/compose/hub.override.dev.yml \
#     -f deploy/compose/hub.override.host-tunnel.yml \
#     --profile minimal up -d --build
services:
  cloudflared:
    image: alpine:3.20
    command: ["sleep", "infinity"]
    user: "65534:65534"
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
