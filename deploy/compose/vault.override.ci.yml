# Override for CI / pytest: no outbound Cloudflare quick tunnel.
services:
  cloudflared:
    image: alpine:3.20
    command: ["sleep", "infinity"]
    user: "65534:65534"
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
