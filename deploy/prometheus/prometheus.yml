# Hub Prometheus —Greenfield M0.9 (minimal scrape set).
#
# See architecture/mvp.md §10 for the full metric/dashboard taxonomy.

global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.example.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: hub-api
    metrics_path: /metrics
    scheme: http
    authorization:
      credentials_file: /etc/prometheus/bearer.token
    static_configs:
      - targets: ["api:8000"]

  - job_name: node_exporter
    static_configs:
      - targets: ["prom-node-exporter:9100"]

  # NATS / cloudflared JSON metrics need exporters or recording rules — deferred past M0.
