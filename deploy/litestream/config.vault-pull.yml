# Litestream restore target config for Vault `r2-pull` worker (M1.10).
# Uses the same replica URL as Hub replication (`config.yml`) but local DB path on Vault.
#
# Env vars match Hub Litestream (ACCESS_KEY_ID, SECRET_ACCESS_KEY, REPLICA_ENDPOINT,
# REPLICA_URL, SKIP_VERIFY).

access-key-id: ${ACCESS_KEY_ID}
secret-access-key: ${SECRET_ACCESS_KEY}

dbs:
  - path: /var/lib/vault/db/terra.sqlite
    replicas:
      - url: ${REPLICA_URL}
        endpoint: ${REPLICA_ENDPOINT}
        force-path-style: true
        skip-verify: ${SKIP_VERIFY:-false}
